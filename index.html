<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Preventivi Bici — Taddei Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<style>

:root {
  --bg: #0a0a0a;
  --bg-2: #141414;
  --bg-3: #1c1c1c;
  --line: #2a2a2a;
  --line-2: #3a3a3a;
  --txt: #ededed;
  --txt-dim: #9a9a9a;
  --txt-mute: #5a5a5a;
  --red: #c8102e;
  --red-bright: #e62236;
  --accent: #f4e3c1;
  --green: #4ade80;
  --warn: #fbbf24;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--txt);
  font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.4;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

input, button, select, textarea {
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}

/* === HEADER === */
header.app-header {
  background: var(--bg);
  border-bottom: 2px solid var(--red);
  padding: 14px 24px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
header.app-header nav.tabs {
  position: static;
  right: auto;
  top: auto;
  transform: none;
  justify-self: end;
}
.logo {
  display: flex;
  align-items: center;
  gap: 14px;
  justify-self: start;
}
.header-logo {
  max-height: 54px;
  max-width: 170px;
  width: auto;
  height: auto;
}
.header-logo:not([src]), .header-logo[src=""] { display: none; }
.logo-mark {
  font-family: 'Bebas Neue', 'Oswald', 'Impact', 'Arial Narrow', sans-serif;
  font-size: 28px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--txt);
  line-height: 1;
  text-align: center;
  justify-self: center;
}
.logo-mark span { color: var(--red); }
.logo-tag {
  font-family: 'Bebas Neue', 'Oswald', 'Impact', sans-serif;
  font-size: 13px;
  letter-spacing: 0.18em;
  color: var(--txt-dim);
  text-transform: uppercase;
}

nav.tabs {
  display: flex;
  gap: 0;
}
nav.tabs button {
  background: transparent;
  border: none;
  color: var(--txt-dim);
  padding: 10px 18px;
  font-family: 'Bebas Neue', 'Oswald', 'Impact', sans-serif;
  font-size: 16px;
  letter-spacing: 0.1em;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  text-transform: uppercase;
  transition: all .15s;
}
nav.tabs button:hover { color: var(--txt); }
nav.tabs button.active {
  color: var(--txt);
  border-bottom-color: var(--red);
}

main {
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
}

.view { display: none; }
.view.active { display: block; }

h2.section-title {
  font-family: 'Bebas Neue', 'Oswald', 'Impact', sans-serif;
  font-size: 32px;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
  text-transform: uppercase;
}
h2.section-title span { color: var(--red); }
.section-sub {
  color: var(--txt-dim);
  font-size: 13px;
  margin-bottom: 20px;
}

/* === DISCIPLINE TABS === */
.discipline-tabs {
  display: flex;
  gap: 2px;
  margin-bottom: 20px;
  background: var(--bg-2);
  padding: 4px;
  border-radius: 4px;
  width: fit-content;
}
.discipline-tabs button {
  background: transparent;
  border: none;
  color: var(--txt-dim);
  padding: 8px 18px;
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 15px;
  letter-spacing: 0.1em;
  cursor: pointer;
  text-transform: uppercase;
  border-radius: 3px;
  transition: all .15s;
}
.discipline-tabs button:hover { color: var(--txt); }
.discipline-tabs button.active {
  background: var(--red);
  color: white;
}

/* === TOOLBAR === */
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  align-items: center;
  flex-wrap: wrap;
}
.toolbar input[type="text"], .toolbar input[type="search"] {
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 8px 12px;
  color: var(--txt);
  border-radius: 3px;
  min-width: 240px;
}
.toolbar input:focus {
  outline: none;
  border-color: var(--red);
}

/* === BUTTONS === */
button.btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--txt);
  padding: 8px 14px;
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 14px;
  letter-spacing: 0.08em;
  cursor: pointer;
  border-radius: 3px;
  text-transform: uppercase;
  transition: all .12s;
}
button.btn:hover { background: var(--bg-3); border-color: var(--line-2); }
button.btn.primary {
  background: var(--red);
  border-color: var(--red);
  color: white;
}
button.btn.primary:hover { background: var(--red-bright); }
button.btn.ghost {
  background: transparent;
}
button.btn.danger {
  border-color: var(--red);
  color: var(--red);
}
button.btn.danger:hover {
  background: var(--red);
  color: white;
}
button.btn.small {
  padding: 4px 8px;
  font-size: 12px;
}

/* === TABLE === */
.table-wrap {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 4px;
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: collapse;
}
table thead th {
  background: var(--bg-3);
  color: var(--txt-dim);
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 12px;
  letter-spacing: 0.12em;
  font-weight: 400;
  text-align: left;
  padding: 10px 12px;
  border-bottom: 1px solid var(--line);
  text-transform: uppercase;
  white-space: nowrap;
}
table tbody td {
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
  vertical-align: middle;
}
table tbody tr:hover { background: var(--bg-3); }
table tbody tr.cat-row td {
  background: #1f0f12;
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  letter-spacing: 0.14em;
  color: var(--red-bright);
  font-size: 13px;
  text-transform: uppercase;
  padding: 8px 12px;
  border-bottom: 1px solid var(--line);
}
table tbody tr.cat-row:hover { background: #2a1418; }

td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
td.center, th.center { text-align: center; }
td.actions { white-space: nowrap; }
td.actions button { margin-right: 4px; }

/* === INLINE INPUTS IN TABLES === */
input.inline {
  background: var(--bg-3);
  border: 1px solid var(--line);
  color: var(--txt);
  padding: 4px 6px;
  border-radius: 2px;
  width: 70px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}
input.inline:focus { outline: none; border-color: var(--red); }
input.inline.qty { width: 50px; text-align: center; background: var(--bg); border-color: var(--line-2); }
input.inline.qty.has-qty { border-color: var(--red); color: var(--accent); font-weight: 600; }

/* margine inline */
.margin-input-wrap {
  display: inline-flex;
  align-items: center;
  gap: 2px;
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 0 4px 0 0;
}
.margin-input-wrap.override {
  border-color: var(--warn);
  background: rgba(251, 191, 36, 0.08);
}
.margin-input-wrap input.margine {
  width: 48px;
  border: none;
  background: transparent;
  text-align: right;
  padding: 4px 2px 4px 6px;
}
.margin-input-wrap input.margine:focus { outline: none; }
.margin-input-wrap.override input.margine { color: var(--warn); font-weight: 600; }
.margin-input-wrap .pct {
  font-size: 11px;
  color: var(--txt-mute);
  padding-right: 2px;
}
.margin-input-wrap.override .pct { color: var(--warn); }
.reset-margin {
  background: transparent;
  border: none;
  color: var(--warn);
  cursor: pointer;
  font-size: 14px;
  padding: 0 4px;
  line-height: 1;
}
.reset-margin:hover { color: var(--red-bright); }

/* dot indicatore bozza con quantità sui tab disciplina */
.discipline-tabs button { position: relative; }
.qty-dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
  margin-left: 6px;
  vertical-align: middle;
}
.discipline-tabs button.active .qty-dot { background: white; }

/* === MODAL === */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--bg-2);
  border: 1px solid var(--line-2);
  border-top: 3px solid var(--red);
  border-radius: 4px;
  width: 100%;
  max-width: 520px;
  padding: 24px;
}
.modal h3 {
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 22px;
  letter-spacing: 0.06em;
  margin-bottom: 16px;
  text-transform: uppercase;
}
.modal h3 span { color: var(--red); }
.field {
  margin-bottom: 12px;
}
.field label {
  display: block;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--txt-dim);
  margin-bottom: 4px;
  text-transform: uppercase;
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
}
.field input, .field select {
  background: var(--bg-3);
  border: 1px solid var(--line);
  color: var(--txt);
  padding: 8px 10px;
  width: 100%;
  border-radius: 3px;
}
.field input:focus, .field select:focus {
  outline: none;
  border-color: var(--red);
}
.field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.modal-actions {
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  margin-top: 20px;
}

/* === PREVENTIVO === */
.preventivo-meta {
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 16px 20px;
  border-radius: 4px;
  margin-bottom: 16px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 16px;
  align-items: end;
}
.preventivo-meta .field { margin-bottom: 0; }

.totals-block {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-top: 3px solid var(--red);
  border-radius: 4px;
  margin-top: 20px;
  padding: 20px 24px;
}
.totals-grid {
  display: grid;
  grid-template-columns: 1fr auto auto;
  column-gap: 32px;
  row-gap: 8px;
  align-items: center;
}
.totals-grid .label {
  font-size: 13px;
  color: var(--txt-dim);
}
.totals-grid .label.strong {
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  letter-spacing: 0.08em;
  color: var(--txt);
  font-size: 15px;
  text-transform: uppercase;
}
.totals-grid .val {
  font-variant-numeric: tabular-nums;
  text-align: right;
  white-space: nowrap;
  min-width: 100px;
}
.totals-grid .val.strong { font-weight: 600; font-size: 15px; }
.totals-grid .val.huge {
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 22px;
  letter-spacing: 0.04em;
}
.totals-grid .val.red { color: var(--red-bright); }
.totals-grid .val.green { color: var(--green); }
.totals-grid .val.orange { color: #f59e0b; }
.totals-grid input.inline { width: 110px; }
.totals-grid .full { grid-column: 1 / -1; }
.totals-grid .full input.text-wide {
  width: 100%;
  box-sizing: border-box;
  background: var(--bg-3);
  border: 1px solid var(--line);
  color: var(--txt);
  padding: 5px 8px;
  border-radius: 2px;
  text-align: left;
  font-size: 13px;
}
.totals-grid .full input.text-wide::placeholder { color: var(--txt-mute); }
.totals-grid .full input.text-wide:focus { outline: none; border-color: var(--red); }
.totals-grid .full.inline-field { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.totals-grid .full.inline-field label { font-size: 13px; color: var(--txt-dim); }
.totals-grid hr.divider {
  grid-column: 1 / -1;
  border: none;
  border-top: 1px solid var(--line);
  margin: 6px 0;
}
.totals-section-title {
  grid-column: 1 / -1;
  font-family: 'Bebas Neue', 'Oswald', 'Impact', sans-serif;
  font-size: 13px;
  letter-spacing: 0.16em;
  color: var(--red-bright);
  text-transform: uppercase;
  margin-top: 4px;
  border-left: 3px solid var(--red);
  padding-left: 10px;
}
.pct-badge {
  display: inline-block;
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 12px;
  letter-spacing: 0.04em;
  padding: 2px 7px;
  border-radius: 3px;
  background: rgba(74, 222, 128, 0.15);
  margin-left: 6px;
  vertical-align: middle;
}
.pct-badge.green { color: var(--green); background: rgba(74, 222, 128, 0.15); }
.pct-badge.red   { color: var(--red-bright); background: rgba(200, 16, 46, 0.15); }
.pct-badge.big {
  font-size: 16px;
  padding: 3px 10px;
}

/* === RIEPILOGO MARGINI (blocco separato) === */
.riepilogo-block {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-left: 3px solid #f59e0b;
  border-radius: 4px;
  margin-top: 14px;
  padding: 16px 24px 18px;
}
.riepilogo-title {
  font-family: 'Bebas Neue', 'Oswald', 'Impact', sans-serif;
  font-size: 14px;
  letter-spacing: 0.16em;
  color: #f59e0b;
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-wrap: wrap;
}
.riepilogo-sub {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: var(--txt-mute);
  font-weight: 400;
  text-transform: none;
  font-style: italic;
}
.riepilogo-grid {
  display: grid;
  row-gap: 8px;
}
.rg-row {
  display: grid;
  grid-template-columns: 1fr 160px 90px;
  column-gap: 16px;
  align-items: center;
}
.rg-row.big { padding-top: 6px; border-top: 1px solid var(--line); margin-top: 4px; }
.rg-label { font-size: 13px; color: var(--txt-dim); }
.rg-label.strong {
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  letter-spacing: 0.08em;
  color: var(--txt);
  font-size: 15px;
  text-transform: uppercase;
}
.rg-val {
  text-align: right;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}
.rg-val.strong { font-weight: 600; font-size: 15px; }
.rg-val.huge {
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 22px;
  letter-spacing: 0.04em;
}
.rg-val.orange { color: #f59e0b; }
.rg-val.green { color: var(--green); }
.rg-val.red { color: var(--red-bright); }
.rg-pct { text-align: right; }
.col-header {
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--txt-mute);
  text-align: right;
  text-transform: uppercase;
}

/* === COLONNA SPECIFICHE === */
td.spec-cell { min-width: 130px; max-width: 200px; padding: 4px 6px; vertical-align: middle; }
.spec-input {
  width: 100%; box-sizing: border-box;
  background: var(--bg-2); border: 1px solid var(--line);
  color: var(--txt-dim); font-size: 11px; padding: 3px 5px; border-radius: 2px;
}
.spec-input::placeholder { color: var(--txt-mute); font-size: 10px; }
.spec-input:focus { outline: none; border-color: var(--red); color: var(--txt); }
.spec-input.has-val { color: var(--txt); border-color: var(--line-2); background: var(--bg-3); }
select.spec-input { cursor: pointer; }
.spec-duo { display: flex; gap: 4px; }
.spec-duo .spec-input { flex: 1; }
.spec-duo .spec-input.taglia { width: 70px; flex: none; }
tr.row-note td { padding: 0 8px 4px; }
.note-riga-input {
  width: 100%; box-sizing: border-box;
  background: transparent; border: none; border-bottom: 1px dashed var(--line);
  color: var(--txt-dim); font-size: 11px; padding: 2px 4px; border-radius: 0;
  transition: background 0.15s, border-color 0.15s;
}
.note-riga-input::placeholder { color: var(--txt-mute); }
.note-riga-input:focus { outline: none; border-bottom-color: var(--red); background: var(--bg-2); color: var(--txt); border-radius: 2px; }
.note-riga-input.has-nota { color: var(--txt); border-bottom-color: var(--line-2); }
select.note-riga-input {
  background: var(--bg-3); border: 1px solid var(--line);
  color: var(--txt-dim); padding: 3px 6px; border-radius: 2px; font-size: 11px;
}
select.note-riga-input.has-nota { color: var(--txt); border-color: var(--line-2); }
select.note-riga-input option { background: var(--bg-3); color: var(--txt); }

/* === EXTRA VOCI === */
.extra-voci-section { margin-top: 18px; }
.extra-voci-section h3 { font-size: 13px; color: var(--txt-dim); text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 8px; }
.extra-voce-row { display: grid; grid-template-columns: 1fr 120px auto; gap: 8px;
  align-items: center; margin-bottom: 6px; }
.extra-voce-row input { background: var(--bg-3); border: 1px solid var(--line);
  color: var(--txt); padding: 5px 8px; border-radius: 2px; font-size: 13px; }
.extra-voce-row input::placeholder { color: var(--txt-mute); }
.extra-voce-row input:focus { outline: none; border-color: var(--red); }
.extra-voce-row input.prezzo-extra { text-align: right; font-variant-numeric: tabular-nums; }
.btn-rm-extra { background: none; border: none; color: var(--txt-mute); cursor: pointer;
  font-size: 16px; padding: 2px 6px; border-radius: 2px; }
.btn-rm-extra:hover { color: var(--red-bright); background: var(--bg-3); }
.btn-add-extra { margin-top: 4px; }

/* === VERSIONI === */
.versioni-panel { margin-top: 10px; border-top: 1px solid var(--line); padding-top: 10px; }
.versioni-panel h3 { font-size: 12px; color: var(--txt-dim); text-transform: uppercase;
  letter-spacing: 0.06em; margin-bottom: 6px; }
.versione-row { display: flex; gap: 10px; align-items: center; padding: 4px 0;
  border-bottom: 1px solid var(--line); font-size: 12px; color: var(--txt-dim); }
.versione-row .vs-ts { flex: 1; }
.versione-row .vs-tot { font-variant-numeric: tabular-nums; color: var(--txt); }

/* === STORICO === */
.storico-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  padding: 14px 18px;
  border-radius: 4px;
  display: grid;
  grid-template-columns: 100px 1fr 120px 140px 1fr auto;
  gap: 16px;
  align-items: center;
  margin-bottom: 8px;
}
.storico-card .data {
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  letter-spacing: 0.06em;
  color: var(--red-bright);
  font-size: 14px;
}
.storico-card .cliente { font-weight: 600; }
.storico-card .disciplina {
  background: var(--bg-3);
  padding: 3px 8px;
  border-radius: 3px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--txt-dim);
  text-align: center;
  width: fit-content;
}
.storico-card .totale {
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 18px;
  text-align: right;
}
.storico-card .note { color: var(--txt-mute); font-size: 12px; font-style: italic; }
.empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--txt-mute);
  font-style: italic;
}

/* === BACKUP === */
.backup-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.backup-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 20px;
}
.backup-card h4 {
  font-family: 'Bebas Neue', 'Oswald', sans-serif;
  font-size: 18px;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.backup-card p {
  color: var(--txt-dim);
  font-size: 12px;
  margin-bottom: 14px;
}
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--bg-3);
  border-left: 3px solid var(--green);
  padding: 12px 18px;
  border-radius: 3px;
  font-size: 13px;
  z-index: 2000;
  display: none;

  // se l'arrotondamento manuale è valorizzato, sostituisce il prezzo calcolato
  const prezzo_finale_cliente = arrotondamento_finale > 0 ? arrotondamento_finale : base_cliente;
  const sconto_arrotondamento = arrotondamento_finale > 0 ? (base_cliente - arrotondamento_finale) : 0;
  // ricalcolo margine effettivo col prezzo finale realmente incassato
  // incasso reale dalla bici (al netto della spedizione che è un costo girato) + rivendita usato
  const incasso_bici_netto = prezzo_finale_cliente - spese_spedizione;
  const incassato_reale = incasso_bici_netto + (prev.rivendita_usato_scontato || 0);
  // l'usato dato al cliente è già scalato dentro prezzo_finale_cliente
  const margine_reale = incassato_reale - costo_pezzi_iva;
  const margine_reale_pct = costo_pezzi_iva > 0 ? (margine_reale / costo_pezzi_iva) : 0;

  return {
    tot_articoli_scontato, tot_articoli_listino,
    tot_articoli_scontato_lordo, tot_extra, extra,
    sconto_10_listino, tot_finito,
    diff_scontato, diff_listino,
    incassato_scontato, incassato_listino,
    margine_scontato, margine_listino,
    costo_pezzi_iva,
    margine_bici, margine_bici_pct,
    delta_usato, haUsato,
    margine_finale, margine_finale_pct,
    spese_spedizione, haSpedizione, haUsatoCliente,
    base_cliente, arrotondamento_finale,
    prezzo_finale_cliente, sconto_arrotondamento,
    incassato_reale, margine_reale, margine_reale_pct,
  };
}

// === NAVIGATION ===
function setView(v) {
  currentView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('nav.tabs button').forEach(b => {
    b.classList.toggle('active', b.dataset.view === v);
  });
  if (v === 'catalogo') renderCatalogo();
  if (v === 'preventivo') renderPreventivo();
  if (v === 'storico') renderStorico();
  if (v === 'backup') renderBackup();
}

// === CATALOGO ===
function renderCatalogo() {
  // discipline tabs
  const tabs = document.getElementById('cat-discipline-tabs');
  tabs.innerHTML = DISCIPLINE.map(d =>
    `<button data-disc="${d}" class="${d === currentDisciplinaCatalogo ? 'active' : ''}">${d}</button>`
  ).join('');
  tabs.querySelectorAll('button').forEach(b => {
    b.onclick = () => { currentDisciplinaCatalogo = b.dataset.disc; renderCatalogo(); };
  });

  const filtro = document.getElementById('cat-search').value.toLowerCase();
  const articoli = state.catalogo[currentDisciplinaCatalogo].articoli;
  const tbody = document.getElementById('cat-tbody');
  let lastCat = null;
  let html = '';
  let visibili = 0;
  for (const [i, art] of articoli.entries()) {
    const matchFiltro = !filtro || art.descrizione.toLowerCase().includes(filtro) || art.categoria.toLowerCase().includes(filtro);
    if (!matchFiltro) continue;
    if (art.categoria !== lastCat) {
      html += `<tr class="cat-row"><td colspan="6">${escapeHtml(art.categoria)}</td></tr>`;
      lastCat = art.categoria;
    }
    visibili++;
    const marginePct = (art.margine * 100).toFixed(art.margine * 100 % 1 === 0 ? 0 : 1);
    html += `<tr>
      <td>${escapeHtml(art.descrizione)}</td>
      <td class="num">${fmtEur(art.prezzo_listino)}</td>
      <td class="num">${fmtEur(art.prezzo_acquisto)}</td>
      <td class="num">
        <span class="margin-input-wrap">
          <input type="number" min="0" step="0.5" class="inline margine" value="${marginePct}" data-idx="${i}" onchange="setMargineCatalogo(${i}, this.value)">
          <span class="pct">%</span>
        </span>
      </td>
      <td class="num" data-vendita-idx="${i}">${fmtEur(art.prezzo_acquisto * (1 + 0.22) * (1 + art.margine))}</td>
      <td class="actions">
        <button class="btn small" onclick="apriEditaArticolo('${currentDisciplinaCatalogo}', ${i})">Modifica</button>
        <button class="btn small danger" onclick="eliminaArticolo('${currentDisciplinaCatalogo}', ${i})">×</button>
      </td>
    </tr>`;
  }
  if (visibili === 0) html = '<tr><td colspan="6" class="empty">Nessun articolo trovato</td></tr>';
  tbody.innerHTML = html;
  document.getElementById('cat-count').textContent = `${articoli.length} articoli`;
}

function apriNuovoArticolo() {
  editandoArticolo = null;
  document.getElementById('modal-art-title').innerHTML = 'NUOVO <span>ARTICOLO</span>';
  document.getElementById('modal-art-disciplina').value = currentDisciplinaCatalogo;
  document.getElementById('modal-art-disciplina').disabled = false;
  document.getElementById('modal-art-categoria').value = '';
  document.getElementById('modal-art-descrizione').value = '';
  document.getElementById('modal-art-listino').value = '';
  document.getElementById('modal-art-acquisto').value = '';
  document.getElementById('modal-art-margine').value = '25';
  popolaCategorieDatalist();
  document.getElementById('modal-articolo').classList.add('show');
  setTimeout(() => document.getElementById('modal-art-descrizione').focus(), 50);
}

function apriEditaArticolo(disc, idx) {
  const art = state.catalogo[disc].articoli[idx];
  editandoArticolo = { disciplina: disc, index: idx };
  document.getElementById('modal-art-title').innerHTML = 'MODIFICA <span>ARTICOLO</span>';
  document.getElementById('modal-art-disciplina').value = disc;

  popolaCategorieDatalist();
  document.getElementById('modal-articolo').classList.add('show');
}

function popolaCategorieDatalist() {
  const disc = document.getElementById('modal-art-disciplina').value;
  const dl = document.getElementById('cat-list-datalist');
  const cats = [...new Set(state.catalogo[disc].articoli.map(a => a.categoria))].sort();
  dl.innerHTML = cats.map(c => `<option value="${escapeHtml(c)}">`).join('');
}

function chiudiModalArt() {
  document.getElementById('modal-articolo').classList.remove('show');
}

function salvaArticolo() {
  const disc = document.getElementById('modal-art-disciplina').value;
  const cat = document.getElementById('modal-art-categoria').value.trim().toUpperCase();
  const desc = document.getElementById('modal-art-descrizione').value.trim();
  const listino = parseFloat(document.getElementById('modal-art-listino').value) || 0;
  const acquisto = parseFloat(document.getElementById('modal-art-acquisto').value) || 0;
  const margine = (parseFloat(document.getElementById('modal-art-margine').value) || 0) / 100;
  if (!cat || !desc) {
    toast('Categoria e descrizione obbligatorie', true);
    return;
  }
  const art = { categoria: cat, descrizione: desc, prezzo_listino: listino, prezzo_acquisto: acquisto, margine };
  if (editandoArticolo) {
    state.catalogo[editandoArticolo.disciplina].articoli[editandoArticolo.index] = art;
  } else {
    // insert grouped by category: append after last article of that category, or at end
    const arr = state.catalogo[disc].articoli;
    let lastSameCat = -1;
    for (let i = arr.length - 1; i >= 0; i--) {
      if (arr[i].categoria === cat) { lastSameCat = i; break; }
    }
    if (lastSameCat >= 0) arr.splice(lastSameCat + 1, 0, art);
    else arr.push(art);
  }
  saveState();
  chiudiModalArt();
  renderCatalogo();
  toast(editandoArticolo ? 'Articolo aggiornato' : 'Articolo aggiunto');
}

function eliminaArticolo(disc, idx) {
  const art = state.catalogo[disc].articoli[idx];
  if (!confirm(`Eliminare "${art.descrizione}"?`)) return;
  state.catalogo[disc].articoli.splice(idx, 1);
  saveState();
  renderCatalogo();
  toast('Articolo eliminato');
}

async function setMargineCatalogo(idx, val) {
  const disc = currentDisciplinaCatalogo;
  const articoli = state.catalogo[disc].articoli;
  const art = articoli[idx];
  const nuovo = parseFloat(val);
  if (isNaN(nuovo) || nuovo < 0) { renderCatalogo(); return; }
  art.margine = nuovo / 100;
  setSyncStatus('syncing');
  await saveStateCloud();
  setSyncStatus('ok');
  toast('Margine salvato ☁');
  // aggiorna solo la cella vendita della riga
  const tbody = document.getElementById('cat-tbody');
  const td = tbody.querySelector(`td[data-vendita-idx="${idx}"]`);
  if (td) td.textContent = fmtEur(art.prezzo_acquisto * (1 + 0.22) * (1 + art.margine));
}

// === PREVENTIVO ===
function getPrev() {
  // ritorna il draft della disciplina attualmente selezionata
  return ensureDraft(currentDisciplinaPreventivo);
}

function caricaPreventivo(id) {
  const p = state.preventivi.find(x => x.id === id);
  if (!p) return;
  // sovrascrive il draft della stessa disciplina con una copia profonda
  const copia = JSON.parse(JSON.stringify(p));
  if (!copia.margine_override) copia.margine_override = {};
  // sicurezza: sincronizza la lunghezza di quantita
  const len = state.catalogo[copia.disciplina].articoli.length;
  while (copia.quantita.length < len) copia.quantita.push(0);
  copia.quantita = copia.quantita.slice(0, len);
  state.drafts[copia.disciplina] = copia;
  saveState();
  currentDisciplinaPreventivo = copia.disciplina;
  setView('preventivo');
}

function renderPreventivo() {
  const prev = getPrev();

  // discipline tabs — semplice switch, niente più conferme: ogni disciplina ha il suo draft indipendente
  const tabs = document.getElementById('prev-discipline-tabs');
  tabs.innerHTML = DISCIPLINE.map(d => {
    const draft = state.drafts && state.drafts[d];
    const haQt = draft && draft.quantita && draft.quantita.some(q => q > 0);
    return `<button data-disc="${d}" class="${d === prev.disciplina ? 'active' : ''}">${d}${haQt ? '<span class="qty-dot"></span>' : ''}</button>`;
  }).join('');
  tabs.querySelectorAll('button').forEach(b => {
    b.onclick = () => {
      currentDisciplinaPreventivo = b.dataset.disc;
      renderPreventivo();
    };
  });

  // meta inputs
  document.getElementById('prev-cliente').value = prev.cliente || '';
  document.getElementById('prev-operatore').value = prev.operatore || '';
  document.getElementById('prev-data').value = prev.data || todayISO();
  document.getElementById('prev-note').value = prev.note || '';
  document.getElementById('prev-stato').textContent = prev.id ? 'SALVATO' : 'BOZZA';
  document.getElementById('prev-stato').style.color = prev.id ? 'var(--green)' : 'var(--warn)';

  // articoli
  const articoli = state.catalogo[prev.disciplina].articoli;
  const tbody = document.getElementById('prev-tbody');
  const filtro = document.getElementById('prev-search').value.toLowerCase();
  const soloAttivi = document.getElementById('prev-solo-attivi').checked;
  let lastCat = null;
  let html = '';
  let visibili = 0;
  for (const [i, art] of articoli.entries()) {
    const qt = prev.quantita[i] || 0;
    const matchFiltro = !filtro || art.descrizione.toLowerCase().includes(filtro) || art.categoria.toLowerCase().includes(filtro);
    const matchAttivi = !soloAttivi || qt > 0;
    if (!matchFiltro || !matchAttivi) continue;
    if (art.categoria !== lastCat) {
      html += `<tr class="cat-row"><td colspan="8">${escapeHtml(art.categoria)}</td></tr>`;
      lastCat = art.categoria;
    }
    visibili++;
    const margineEff = getMargine(prev, i, art);
    const hasOverride = prev.margine_override[i] !== undefined && prev.margine_override[i] !== null;
    const r = calcRiga(art, qt, margineEff);
    const marginePct = (margineEff * 100).toFixed(margineEff * 100 % 1 === 0 ? 0 : 1);
    html += `<tr class="${qt > 0 ? 'row-active' : ''}">
      <td>${escapeHtml(art.descrizione)}</td>` +
      renderSpecCell(i, art.categoria, prev.note_righe || {}, art.descrizione) +
      `<td class="num">${fmtEur(art.prezzo_listino)}</td>
      <td class="num">${fmtEur(art.prezzo_acquisto)}</td>
      <td class="num margin-cell">
        <span class="margin-input-wrap ${hasOverride ? 'override' : ''}">
          <input type="number" min="0" step="0.5" class="inline margine" value="${marginePct}" data-idx="${i}" onchange="setMargine(${i}, this.value)" title="Margine catalogo: ${(art.margine*100).toFixed(0)}%">
          <span class="pct">%</span>
          ${hasOverride ? `<button class="reset-margin" onclick="resetMargine(${i})" title="Ripristina margine catalogo (${(art.margine*100).toFixed(0)}%)">↺</button>` : ''}
        </span>
      </td>
      <td class="center"><input type="number" min="0" step="1" class="inline qty ${qt > 0 ? 'has-qty' : ''}" value="${qt}" data-idx="${i}" onchange="setQt(${i}, this.value)" oninput="setQt(${i}, this.value)"></td>
      <td class="num">${qt > 0 ? fmtEur(r.c_iva) : '—'}</td>
      <td class="num">${qt > 0 ? '<strong>' + fmtEur(r.scontato) + '</strong>' : '—'}</td>
    </tr>`;
  }
  if (visibili === 0) html = '<tr><td colspan="8" class="empty">Nessun articolo</td></tr>';
  tbody.innerHTML = html;

  renderTotaliPreventivo();
  renderExtraVoci();
  renderVersioni(prev);
}

function setQt(idx, val) {
  const prev = getPrev();
  prev.quantita[idx] = Math.max(0, parseInt(val) || 0);
  saveState();
  renderTotaliPreventivo();
  // Update solo la riga interessata senza full re-render (UX fluida)
  const tbody = document.getElementById('prev-tbody');
  const inp = tbody.querySelector(`input.qty[data-idx="${idx}"]`);
  if (inp) {
    const tr = inp.closest('tr');
    const qt = prev.quantita[idx];
    tr.classList.toggle('row-active', qt > 0);
    inp.classList.toggle('has-qty', qt > 0);
    const art = state.catalogo[prev.disciplina].articoli[idx];
    const margineEff = getMargine(prev, idx, art);
    const r = calcRiga(art, qt, margineEff);
    const tds = tr.querySelectorAll('td');
    // colonne: 0=Articolo 1=Specifiche 2=P.Listino 3=P.Acquisto 4=Margine 5=Qtà 6=C/Iva 7=Scontato
    tds[6].innerHTML = qt > 0 ? fmtEur(r.c_iva) : '—';
    tds[7].innerHTML = qt > 0 ? '<strong>' + fmtEur(r.scontato) + '</strong>' : '—';
  }
  // aggiorna l'indicatore "ha bozza" sul tab disciplina
  refreshDisciplineDots();
}

function setNotaRiga(idx, val) {
  const prev = getPrev();
  if (!prev.note_righe) prev.note_righe = {};
  if (val.trim()) prev.note_righe[idx] = val;
  else delete prev.note_righe[idx];
  saveState();
}

function handleRapporti(idx, val) {
  if (val === 'altro') {
    const el = document.getElementById('rapporti-altro-' + idx);
    if (el && el.tagName === 'SPAN') {
      // Sostituisci lo span con un input vero
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.className = 'spec-input has-val';
      inp.placeholder = 'es. 53/39 11-28';
      inp.style.flex = '1';
      inp.id = 'rapporti-altro-' + idx;
      inp.onchange = function() { setCampoRiga(idx, 'rapporti', this.value); };
      el.parentNode.replaceChild(inp, el);
      inp.focus();
    } else if (el) {
      el.style.display = '';
      el.focus();
    }
  } else {
    setCampoRiga(idx, 'rapporti', val);
    const el = document.getElementById('rapporti-altro-' + idx);
    if (el) el.style.display = 'none';
  }
}

function setCampoRiga(idx, campo, val) {
  const prev = getPrev();
  if (!prev.note_righe) prev.note_righe = {};
  const cur = prev.note_righe[idx] || {};
  if (typeof cur === 'string') {
    // migrazione da vecchio formato stringa
    prev.note_righe[idx] = { nota: cur };
  }
  if (!prev.note_righe[idx] || typeof prev.note_righe[idx] === 'string') prev.note_righe[idx] = {};
  if (val && val.trim()) prev.note_righe[idx][campo] = val.trim();
  else delete prev.note_righe[idx][campo];
  if (Object.keys(prev.note_righe[idx]).length === 0) delete prev.note_righe[idx];
  saveState();
}

function renderSpecCell(i, cat, noteRighe, desc) {
  const tipo = CAT_FIELD[cat];
  const dati = (noteRighe || {})[i] || {};
  const raw = function(k) {
    if (typeof dati === 'string') return k === 'nota' ? dati : '';
    return dati[k] || '';
  };
  const g = function(k) { return escapeHtml(raw(k)); };
  const cv = function(v) { return v ? ' has-val' : ''; };

  let inner = '';
  if (tipo === 'telaio') {
    const taglie = [44, 49, 52, 54, 56, 58, 61];
    const selTg = raw('taglia');
    inner = '<div class="spec-duo">' +
      '<input type="text" class="spec-input' + cv(raw('colore')) + '" placeholder="Colore"' +
        ' value="' + g('colore') + '" onchange="setCampoRiga(' + i + ',\'colore\',this.value)"' +
        ' oninput="this.classList.toggle(\'has-val\',!!this.value)">' +
      '<select class="spec-input taglia' + cv(selTg) + '" onchange="setCampoRiga(' + i + ',\'taglia\',this.value)">' +
        '<option value="">Tg.</option>' +
        taglie.map(function(t){ return '<option value="' + t + '"' + (selTg == t ? ' selected' : '') + '>' + t + '</option>'; }).join('') +
      '</select>' +
    '</div>';
  } else if (tipo === 'gruppo') {
    const pedivelle = ['160', '165', '170', '172.5', '175'];
    const rapporti = ['50/34 11-30','50/34 11-34','52/36 11-30','52/36 11-34','54/40 11-30','54/40 11-34','48/35 10-33','48/35 10-36','altro'];
    const selPed = raw('pedivella');
    const selRap = raw('rapporti');
    const isAltro = selRap && !rapporti.slice(0,-1).includes(selRap);
    inner = '<div class="spec-duo">' +
      '<select class="spec-input' + cv(selPed) + '" onchange="setCampoRiga(' + i + ',\'pedivella\',this.value)">' +
        '<option value="">Pedivella</option>' +
        pedivelle.map(function(v){ return '<option value="' + v + '"' + (selPed===v?' selected':'') + '>' + v + '</option>'; }).join('') +
      '</select>' +
      '<select class="spec-input' + cv(selRap) + '" onchange="handleRapporti(' + i + ',this.value)">' +

    '</div>';

        '110x440 4 Flare','125x440 4 Flare',
        '75x360 12 Flare','100x360 12 Flare','110x360 12 Flare','120x360 12 Flare','135x360 12 Flare',

        '75x380 10 Flare','90x380 10 Flare',
        '75x400 4 Flare','90x380 10 Flare',
      ];

      larghezze.map(function(v){ return '<option value="' + v + '"' + (sel===v?' selected':'') + '>' + v + ' mm</option>'; }).join('') +
    '</select>';

               cat === 'SELLA' ? 'Modello' :

    inner = '<input type="text" class="spec-input' + cv(raw('spec')) + '" placeholder="' + ph + '"' +

  } else if (tipo === 'ruote') {
    const sel = raw('tipo_copertura');
    inner = '<select class="spec-input' + cv(sel) + '" onchange="setCampoRiga(' + i + ',\'tipo_copertura\',this.value)">' +
      '<option value="">Copertura</option>' +
      '<option value="Copertoncino"' + (sel === 'Copertoncino' ? ' selected' : '') + '>Copertoncino</option>' +
      '<option value="Tubeless"' + (sel === 'Tubeless' ? ' selected' : '') + '>Tubeless</option>' +
    '</select>';
  } else {
    // nota generica per ACCESSORI ecc.
    const nota = typeof dati === 'string' ? dati : (dati.nota || '');
    inner = '<input type="text" class="spec-input' + cv(nota) + '" placeholder="Note"' +
      ' value="' + escapeHtml(nota) + '" onchange="setNotaRiga(' + i + ',this.value)"' +
      ' oninput="this.classList.toggle(\'has-val\',!!this.value)">';
  }
  return '<td class="spec-cell">' + inner + '</td>';
}

function setMargine(idx, val) {
  const prev = getPrev();
  const articoli = state.catalogo[prev.disciplina].articoli;
  const art = articoli[idx];
  const nuovo = parseFloat(val);
  if (isNaN(nuovo) || nuovo < 0) {
    // input invalido: ripristina senza errori
    renderPreventivo();
    return;
  }
  const nuovoFraz = nuovo / 100;
  // se uguale al margine catalogo, rimuove l'override
  const eq = Math.abs(nuovoFraz - art.margine) < 1e-9;
  if (eq) {
    delete prev.margine_override[idx];
  } else {
    prev.margine_override[idx] = nuovoFraz;
  }
  saveState();
  // re-render parziale: aggiorna la riga corrente e i totali
  const tbody = document.getElementById('prev-tbody');
  const inp = tbody.querySelector(`input.margine[data-idx="${idx}"]`);
  if (inp) {
    const tr = inp.closest('tr');
    const wrap = tr.querySelector('.margin-input-wrap');
    wrap.classList.toggle('override', !eq);
    // aggiorna o rimuove il pulsante reset
    let resetBtn = wrap.querySelector('.reset-margin');
    if (!eq && !resetBtn) {
      resetBtn = document.createElement('button');
      resetBtn.className = 'reset-margin';
      resetBtn.innerHTML = '↺';
      resetBtn.title = `Ripristina margine catalogo (${(art.margine*100).toFixed(0)}%)`;
      resetBtn.onclick = () => resetMargine(idx);
      wrap.appendChild(resetBtn);
    } else if (eq && resetBtn) {
      resetBtn.remove();
    }
    // aggiorna scontato/c_iva
    const qt = prev.quantita[idx] || 0;
    const r = calcRiga(art, qt, getMargine(prev, idx, art));
    const tds = tr.querySelectorAll('td');
    tds[5].innerHTML = qt > 0 ? fmtEur(r.c_iva) : '—';
    tds[6].innerHTML = qt > 0 ? '<strong>' + fmtEur(r.scontato) + '</strong>' : '—';
  }
  renderTotaliPreventivo();
}

function resetMargine(idx) {
  const prev = getPrev();

  saveState();
  renderPreventivo();
}

function salvaPreventivo() {
  const prev = getPrev();
  prev.cliente = document.getElementById('prev-cliente').value.trim();
  prev.operatore = document.getElementById('prev-operatore').value.trim();
  prev.data = document.getElementById('prev-data').value || todayISO();
  prev.note = document.getElementById('prev-note').value.trim();
  if (!prev.cliente) {
    if (!confirm('Nessun nome cliente inserito. Salvare comunque?')) return;
  }
  if (prev.id) {
    // snapshot prima di sovrascrivere
    const vecchio = state.preventivi.find(x => x.id === prev.id);
    if (vecchio) {
      if (!prev.versioni) prev.versioni = [];
      const snap = JSON.parse(JSON.stringify(vecchio));
      delete snap.versioni; // non annidare storico dentro storico
      prev.versioni.push({ ts: Date.now(), snap });
      if (prev.versioni.length > 10) prev.versioni.shift(); // max 10
    }
    const i = state.preventivi.findIndex(x => x.id === prev.id);
    if (i >= 0) state.preventivi[i] = JSON.parse(JSON.stringify(prev));
  } else {
    prev.id = uid();
    state.preventivi.unshift(JSON.parse(JSON.stringify(prev)));
  }
  saveState();
  savePreventivoCloud(prev);
  toast('Preventivo salvato ☁');
  renderPreventivo();
}

function getNotaStampa(i, cat, noteRighe) {
  const tipo = CAT_FIELD[cat];
  const dati = (noteRighe || {})[i] || {};
  if (!dati || (typeof dati === 'object' && Object.keys(dati).length === 0)) return '';
  if (typeof dati === 'string') return dati; // compatibilità vecchio formato
  if (tipo === 'telaio') {
    const parts = [];
    if (dati.colore) parts.push('Colore: ' + dati.colore);
    if (dati.taglia) parts.push('Tg. ' + dati.taglia);
    return parts.join(' — ');
  }
  if (tipo === 'gruppo') {
    const parts = [];
    if (dati.pedivella) parts.push('Ped. ' + dati.pedivella);
    if (dati.rapporti) parts.push('Rap. ' + dati.rapporti);
    return parts.join(' — ');
  }
  if (tipo === 'manubrio') return dati.misura || (dati.attacco ? 'Attacco ' + dati.attacco + ' mm' : '');
  if (tipo === 'sella') return dati.larghezza ? dati.larghezza + ' mm' : '';
  if (tipo === 'testo') return dati.spec || '';
  if (tipo === 'ruote') return dati.tipo_copertura ? 'Copertura: ' + dati.tipo_copertura : '';
  return dati.nota || '';
}

function buildStampa(p) {
  stampaCorrente = p;
  if (!p.margine_override) p.margine_override = {};
  const t = calcTotali(p);
  const articoli = state.catalogo[p.disciplina].articoli;
  let lastCat = null;
  let righe = '';
  const nArticoli = articoli.filter((_, i) => (p.quantita[i] || 0) > 0).length + (t.extra ? t.extra.length : 0);
  for (const [i, art] of articoli.entries()) {
    const qt = p.quantita[i] || 0;
    if (qt <= 0) continue;
    if (art.categoria !== lastCat) {
      righe += `<tr class="cat-row"><td colspan="6">${escapeHtml(art.categoria)}</td></tr>`;
      lastCat = art.categoria;
    }
    const margineEff = getMargine(p, i, art);
    const r = calcRiga(art, qt, margineEff);
    const notaRiga = getNotaStampa(i, art.categoria, p.note_righe);
    righe += `<tr>
      <td>${escapeHtml(art.descrizione)}</td>
      <td style="font-style:italic;color:#222">${escapeHtml(notaRiga)}</td>
      <td style="text-align:center">${qt}</td>
      <td style="text-align:right">${fmtEur(art.prezzo_listino)}</td>
      <td style="text-align:right">${fmtEur(r.listino_tot)}</td>
      <td style="text-align:right;font-weight:600">${fmtEur(r.scontato)}</td>
    </tr>`;
  }
  // extra voci nella stampa venditore
  if (t.extra && t.extra.length > 0) {
    righe += `<tr class="cat-row"><td colspan="6">EXTRA / ACCESSORI</td></tr>`;
    for (const v of t.extra) {
      righe += `<tr>
        <td>${escapeHtml(v.descrizione)}</td>
        <td></td>
        <td style="text-align:center">1</td>
        <td style="text-align:right">${fmtEur(v.prezzo)}</td>
        <td style="text-align:right">${fmtEur(v.prezzo)}</td>
        <td style="text-align:right;font-weight:600">${fmtEur(v.prezzo)}</td>
      </tr>`;
    }
  }

  const cfg = state.config;
  const negozioInt = (cfg.negozio_nome || cfg.negozio_indirizzo || cfg.negozio_tel || cfg.negozio_piva)
    ? `<div style="font-size:11px;color:#666">
        ${escapeHtml(cfg.negozio_nome)}${cfg.negozio_indirizzo ? ' — ' + escapeHtml(cfg.negozio_indirizzo) : ''}<br>
        ${cfg.negozio_tel ? 'Tel: ' + escapeHtml(cfg.negozio_tel) + ' ' : ''}${cfg.negozio_piva ? 'P.IVA: ' + escapeHtml(cfg.negozio_piva) : ''}
       </div>`
    : '';

  const haUsato = (p.usato_cliente_scontato || 0) > 0 || (p.usato_cliente_listino || 0) > 0;
  const totPagaSc = haUsato ? t.diff_scontato : t.tot_finito;
  const totPagaLi = haUsato ? t.diff_listino : t.sconto_10_listino;

  // Versione cliente attiva di default: stampa pulita senza listini/margini
  const versioneCliente = stampaVersioneCliente;

  // Righe articoli versione cliente: prezzi a LISTINO (non scontati)
  let righeCliente = '';
  {
    let lastCat2 = null;
    for (const [i, art] of articoli.entries()) {
      const qt = p.quantita[i] || 0;
      if (qt <= 0) continue;
      if (art.categoria !== lastCat2) {

// === BACKUP ===
function renderBackup() {
  document.getElementById('cfg-nome').value = state.config.negozio_nome || '';
  document.getElementById('cfg-indirizzo').value = state.config.negozio_indirizzo || '';
  document.getElementById('cfg-tel').value = state.config.negozio_tel || '';
  document.getElementById('cfg-piva').value = state.config.negozio_piva || '';
  const stats = {
    articoli: Object.values(state.catalogo).reduce((s, d) => s + d.articoli.length, 0),
    preventivi: state.preventivi.length,
  };
  document.getElementById('backup-stats').textContent = `${stats.articoli} articoli totali, ${stats.preventivi} preventivi salvati`;
}

function salvaConfig() {
  state.config.negozio_nome = document.getElementById('cfg-nome').value.trim();
  state.config.negozio_indirizzo = document.getElementById('cfg-indirizzo').value.trim();
  state.config.negozio_tel = document.getElementById('cfg-tel').value.trim();
  state.config.negozio_piva = document.getElementById('cfg-piva').value.trim();
  saveState();
  toast('Dati negozio salvati');
}

function esportaBackup() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `preventivi_bici_backup_${todayISO()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup esportato');
}

function importaBackup(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.catalogo || !imported.preventivi) throw new Error('File non valido');
      if (!confirm('Sovrascrivere TUTTI i dati attuali con quelli del backup?')) return;
      state = imported;
      if (!state.config) state.config = { negozio_nome:'', negozio_indirizzo:'', negozio_tel:'', negozio_piva:'' };
      if (!state.drafts) state.drafts = {};
      for (const p of state.preventivi) { if (!p.margine_override) p.margine_override = {}; }
      saveState();
      renderBackup();
      toast('Backup importato');
    } catch (err) {
      toast('Errore: ' + err.message, true);
    }
  };
  reader.readAsText(file);
}

function ripristinaCatalogoIniziale() {
  if (!confirm('Ripristinare il catalogo originale dell\'Excel? I preventivi salvati restano. Le modifiche al catalogo verranno perse.')) return;
  state.catalogo = JSON.parse(JSON.stringify(CATALOGO_INIZIALE));
  // reset drafts: lunghezze quantita potrebbero non corrispondere
  state.drafts = {};
  saveState();
  toast('Catalogo originale ripristinato');
  renderBackup();
}

function cancellaTutto() {
  if (!confirm('ATTENZIONE: cancella TUTTI i dati (catalogo + preventivi + bozze). Operazione irreversibile. Continuare?')) return;
  if (!confirm('Sei davvero sicuro? Conferma definitiva.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  toast('Tutti i dati cancellati');
  renderBackup();
}

function esportaCSV() {
  // export catalog as CSV
  let csv = 'Disciplina,Categoria,Descrizione,P.Listino,P.Acquisto,Margine%\n';
  for (const disc of DISCIPLINE) {
    for (const a of state.catalogo[disc].articoli) {
      const safe = s => '"' + String(s).replace(/"/g, '""') + '"';
      csv += `${disc},${safe(a.categoria)},${safe(a.descrizione)},${a.prezzo_listino},${a.prezzo_acquisto},${(a.margine*100).toFixed(2)}\n`;
    }
  }
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `catalogo_${todayISO()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Catalogo esportato in CSV');
}
